<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>OstrogradskySolve – Профиль</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OstrogradskySolve">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
    <div class="top-bar">
        <a href="home.html" class="back-link"><i class="fas fa-arrow-left"></i> На главную</a>
        <div class="greeting" id="greeting">Загрузка...</div>
    </div>
    <div class="profile-page">
        <div class="profile-card">
            <div class="profile-email" id="profileEmail"><i class="fas fa-envelope"></i> user@mail.com</div>
            <div class="rank-title" id="profileRank"><i class="fas fa-chart-line"></i> Новичок</div>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="profileSolved">0</div>
                    <div class="stat-label"><i class="fas fa-check-circle"></i> Решено</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="profileAccuracy">0%</div>
                    <div class="stat-label"><i class="fas fa-percent"></i> Точность</div>
                </div>
            </div>
            <div class="stat-item" style="margin-top:16px;">
                <div class="stat-value" id="profileScore">0</div>
                <div class="stat-label"><i class="fas fa-star"></i> Баллов</div>
            </div>
            <div class="stat-item" style="margin-top:16px;">
                <div class="stat-value" id="profileSolvedTasks" style="font-size: 0.9em;">0</div>
                <div class="stat-label"><i class="fas fa-list-check"></i> Решено задач (ID)</div>
            </div>
            <button class="btn logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
        </div>
    </div>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
