<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>OstrogradskySolve – Вход</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OstrogradskySolve">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
    <div class="top-bar">
        <div class="greeting"><i class="fas fa-graduation-cap"></i> Ostrogradsky.solve</div>
    </div>
    <div class="auth-form">
        <div class="input-group">
            <label for="authEmail"><i class="fas fa-envelope"></i> Электронная почта</label>
            <input type="email" id="authEmail" placeholder="student@example.com">
        </div>
        <div class="input-group">
            <label for="authPassword"><i class="fas fa-lock"></i> Пароль</label>
            <input type="password" id="authPassword" placeholder="••••••••">
        </div>
        <div class="auth-switch">
            <button class="btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Войти</button>
            <button class="btn btn-outline" id="registerBtn"><i class="fas fa-user-plus"></i> Регистрация</button>
        </div>
        <div id="authMessage" class="message hidden"></div>
    </div>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
