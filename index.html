<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ostrogradsky Solve</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; padding-bottom: 1rem; }
        .controls { margin-top: 2rem; }
        button { padding: 10px 15px; margin-right: 10px; cursor: pointer; }
        #userData { margin-top: 20px; padding: 15px; background: #f9f9f9; border: 1px solid #ddd; display: none; }
        textarea { width: 100%; height: 100px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Мой Прогресс</h2>
        <div id="userInfo">Загрузка...</div>
    </div>

    <div class="controls">
        <button id="saveBtn">💾 Сохранить прогресс</button>
        <button id="loadBtn">📂 Загрузить прогресс</button>
        <button id="logoutBtn" style="background: #ff4444; color: white;">Выйти</button>
    </div>

    <!-- Поле для имитации данных приложения -->
    <div id="userData">
        <h3>Данные пользователя:</h3>
        <p>Здесь хранится ваш текущий прогресс (уровень, очки и т.д.).</p>
        <textarea id="gameDataInput" placeholder="Введите тестовые данные для сохранения..."></textarea>
        <div id="statusMsg" style="margin-top: 10px; font-weight: bold;"></div>
    </div>

    <script type="module">
        import { auth, provider, signInWithPopup, signOut, onAuthStateChanged, db, doc, setDoc, getDoc } from './firebase-db.js';

        const userInfoDiv = document.getElementById('userInfo');
        const saveBtn = document.getElementById('saveBtn');
        const loadBtn = document.getElementById('loadBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userDataDiv = document.getElementById('userData');
        const gameDataInput = document.getElementById('gameDataInput');
        const statusMsg = document.getElementById('statusMsg');

        let currentUser = null;

        // Проверка состояния авторизации
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                userInfoDiv.innerHTML = `Привет, <b>${user.displayName}</b>!`;
                userDataDiv.style.display = 'block';
                statusMsg.textContent = '';
                statusMsg.style.color = 'black';
            } else {
                currentUser = null;
                userInfoDiv.innerHTML = '<a href="auth.html">Войти</a>';
                userDataDiv.style.display = 'none';
                window.location.href = 'auth.html'; // Если не вошел - кидаем на вход
            }
        });

        // Сохранение данных
        saveBtn.addEventListener('click', async () => {
            if (!currentUser) return;
            const dataToSave = gameDataInput.value || "Пустые данные";
            
            try {
                // Сохраняем в коллекцию 'users', документ с ID пользователя
                await setDoc(doc(db, "users", currentUser.uid), {
                    name: currentUser.displayName,
                    email: currentUser.email,
                    progress: dataToSave,
                    lastUpdated: new Date()
                });
                statusMsg.textContent = "✅ Прогресс успешно сохранен!";
                statusMsg.style.color = "green";
            } catch (e) {
                console.error("Ошибка сохранения: ", e);
                statusMsg.textContent = "❌ Ошибка: " + e.message;
                statusMsg.style.color = "red";
            }
        });

        // Загрузка данных
        loadBtn.addEventListener('click', async () => {
            if (!currentUser) return;

            try {
                const docRef = doc(db, "users", currentUser.uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    gameDataInput.value = data.progress || "";
                    statusMsg.textContent = "✅ Данные загружены!";
                    statusMsg.style.color = "green";
                } else {
                    statusMsg.textContent = "⚠️ Нет сохраненных данных для этого пользователя.";
                    statusMsg.style.color = "orange";
                }
            } catch (e) {
                console.error("Ошибка загрузки: ", e);
                statusMsg.textContent = "❌ Ошибка: " + e.message;
                statusMsg.style.color = "red";
            }
        });

        // Выход
        logoutBtn.addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.reload();
            });
        });
    </script>
</body>
</html>
